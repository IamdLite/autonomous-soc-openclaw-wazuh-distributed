# =============================================================================
# Prometheus + Grafana stack — kube-prometheus-stack Helm values
# Scrapes: NATS, Redis, Autopilot runtime, Wazuh MCP
# =============================================================================

grafana:
  enabled: true
  adminPassword: soc-grafana-admin   # Change in production
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: soc-dashboards
          orgId: 1
          folder: SOC
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/soc
  dashboardsConfigMaps:
    soc: grafana-soc-dashboard

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      # Autopilot runtime /metrics (all pods)
      - job_name: autopilot-runtime
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [soc-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: autopilot-runtime
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: "soc_.*|nats_.*|redis_.*|circuit_.*"
            action: keep

      # Wazuh MCP Server
      - job_name: wazuh-mcp
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [soc-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: wazuh-mcp
            action: keep

alertmanager:
  enabled: true
  config:
    route:
      receiver: slack-critical
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: slack-critical
        slack_configs:
          - api_url: "{{ SLACK_WEBHOOK_URL }}"
            channel: "#soc-alerts"
            title: "SOC Alert: {{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

---
# =============================================================================
# NGINX Ingress — load balancer + TLS termination
# Routes: /metrics, /healthz, Grafana dashboard
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soc-ingress
  namespace: soc-system
  annotations:
    nginx.ingress.kubernetes.io/load-balance: "least_conn"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: soc.internal   # Change to your domain
      http:
        paths:
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: autopilot-runtime
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: autopilot-runtime
                port:
                  number: 9090
---
# Grafana ingress (monitoring namespace)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.internal   # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-grafana
                port:
                  number: 80

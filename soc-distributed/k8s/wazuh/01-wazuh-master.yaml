---
# =============================================================================
# Wazuh Master Node
# Handles cluster coordination, rule processing, and alert generation
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-master
  namespace: soc-system
  labels:
    app: wazuh
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh
      role: master
  template:
    metadata:
      labels:
        app: wazuh
        role: master
    spec:
      volumes:
        - name: wazuh-config
          configMap:
            name: wazuh-master-config
        - name: wazuh-data
          persistentVolumeClaim:
            claimName: wazuh-master-data
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.12.0
          ports:
            - containerPort: 1514   # agent UDP
            - containerPort: 1515   # agent enrollment
            - containerPort: 1516   # cluster sync
            - containerPort: 55000  # REST API
          env:
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: cluster-key
            - name: WAZUH_MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: password
          volumeMounts:
            - name: wazuh-config
              mountPath: /wazuh-config-mount
            - name: wazuh-data
              mountPath: /var/ossec/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: 55000
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 55000
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-master
  namespace: soc-system
spec:
  selector:
    app: wazuh
    role: master
  ports:
    - name: agent-udp
      port: 1514
      protocol: UDP
    - name: enrollment
      port: 1515
    - name: cluster
      port: 1516
    - name: api
      port: 55000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-master-data
  namespace: soc-system
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-master-config
  namespace: soc-system
data:
  ossec.conf: |
    <ossec_config>
      <cluster>
        <name>wazuh-soc</name>
        <node_name>master-node</node_name>
        <node_type>master</node_type>
        <key>${WAZUH_CLUSTER_KEY}</key>
        <port>1516</port>
        <bind_addr>0.0.0.0</bind_addr>
        <nodes>
          <node>wazuh-master</node>
        </nodes>
        <hidden>no</hidden>
        <disabled>no</disabled>
      </cluster>
      <global>
        <jsonout_output>yes</jsonout_output>
        <alerts_log>yes</alerts_log>
        <logall>no</logall>
        <logall_json>no</logall_json>
        <email_notification>no</email_notification>
      </global>
      <alerts>
        <log_alert_level>3</log_alert_level>
        <email_alert_level>12</email_alert_level>
      </alerts>
      <remote>
        <connection>secure</connection>
        <port>1514</port>
        <protocol>tcp</protocol>
      </remote>
    </ossec_config>

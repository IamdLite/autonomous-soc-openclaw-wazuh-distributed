---
# ── OpenClaw Gateway Service ───────────────────────────────────────────────────
# The internal webhook router that agent wrappers POST to — unchanged from
# the original single-node design. Only the delivery mechanism changed (NATS).
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: soc-system
spec:
  selector:
    app: openclaw-gateway
  ports:
    - name: http
      port: 8888
      targetPort: 8888

---
# =============================================================================
# OpenClaw Agent Deployments — all 7 pipeline agents
# Each agent runs the same nats-wrapper image; AGENT_NAME selects behaviour.
# Agents subscribe to agent.tasks.<name> via NATS JetStream.
# =============================================================================

# ── Shared agent ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: soc-system
data:
  NATS_URL:        "nats://nats:4222"
  OPENCLAW_HOST:   "http://openclaw-gateway:8888"
  METRICS_PORT:    "9091"
  AGENT_CONCURRENCY: "5"
  LOG_LEVEL:       "info"

---
# ─────────────────────────────────────────────────────────────────────────────
# Helper template — repeated per agent (k8s doesn't support YAML anchors in
# multi-doc files portably, so each deployment is explicit)
# ─────────────────────────────────────────────────────────────────────────────

# 1. Triage Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-triage
  namespace: soc-system
  labels: { app: openclaw-agent, agent: triage }
spec:
  replicas: 2
  selector:
    matchLabels: { app: openclaw-agent, agent: triage }
  template:
    metadata:
      labels: { app: openclaw-agent, agent: triage }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9091"
    spec:
      containers:
        - name: agent
          image: ghcr.io/gensecaihq/openclaw-agent-wrapper:latest
          env:
            - { name: AGENT_NAME, value: triage }
          envFrom:
            - configMapRef: { name: agent-config }
            - secretRef:    { name: autopilot-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 9091 }
            initialDelaySeconds: 10
---

---
# =============================================================================
# Horizontal Pod Autoscaler — Autopilot Runtime
# Scales 3 → 10 replicas when CPU exceeds 60%
# Demonstrated by: ./deploy.sh bench  (200-alert burst)
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autopilot-runtime-hpa
  namespace: soc-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autopilot-runtime
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cool-down before scale-in
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

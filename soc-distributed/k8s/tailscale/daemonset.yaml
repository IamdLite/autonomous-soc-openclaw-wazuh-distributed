---
# =============================================================================
# Tailscale — Zero-trust mesh networking
# DaemonSet ensures every node joins the same tailnet.
# Wazuh agents connect to manager via Tailscale IP — no public ports exposed.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale-node
  namespace: soc-system
  labels:
    app: tailscale
spec:
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: sysctls
          image: busybox
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              sysctl -w net.ipv4.ip_forward=1
              sysctl -w net.ipv6.conf.all.forwarding=1
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest
          securityContext:
            privileged: true
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-secret
                  key: authkey
            - name: TS_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TS_EXTRA_ARGS
              value: "--accept-routes --advertise-exit-node=false"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: tailscale-state
          hostPath:
            path: /var/lib/tailscale
            type: DirectoryOrCreate
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
---
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-secret
  namespace: soc-system
type: Opaque
stringData:
  # Replace with your Tailscale auth key from https://login.tailscale.com/admin/settings/authkeys
  authkey: "tskey-auth-REPLACE_ME"
